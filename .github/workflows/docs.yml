name: Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[docs]"
      - run: zensical build --clean
      - id: pages
        name: Check GitHub Pages configuration
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          status="$(
            curl -sS -o pages-response.json -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages"
          )"

          if [ "${status}" = "200" ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${status}" = "404" ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          cat pages-response.json
          echo "GitHub Pages configuration check failed with status ${status}."
          exit 1
      - name: Configure GitHub Pages
        if: steps.pages.outputs.configured == 'true'
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        if: steps.pages.outputs.configured == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - name: Deploy GitHub Pages
        if: steps.pages.outputs.configured == 'true'
        uses: actions/deploy-pages@v5
        id: deployment
      - name: Skip GitHub Pages deployment
        if: steps.pages.outputs.configured != 'true'
        run: |
          {
            echo "### Documentation deployment skipped"
            echo ""
            echo "The documentation site built successfully, but GitHub Pages is not enabled for this repository."
            echo "Enable Pages with source set to GitHub Actions to deploy the built site."
          } >> "${GITHUB_STEP_SUMMARY}"
