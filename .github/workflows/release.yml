name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Triggers the workflow when a version tag is pushed

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: version and tag
    # ONLY run if a push happens on a branch (not a tag) AND it's not the bot's own commit
    if: >-
      github.ref_type == 'branch' &&
      (
        github.actor == vars.PYPI_RELEASE_ACTOR ||
        (vars.PYPI_RELEASE_ACTOR == '' && github.actor == github.repository_owner)
      ) &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          contains(github.event.head_commit.message, '#release') &&
          !startsWith(github.event.head_commit.message, 'chore(release): v')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify release marker
        run: |
          message="$(git log -1 --pretty=%B)"
          message_lower="$(printf '%s' "$message" | tr '[:upper:]' '[:lower:]')"
          if [[ ! "$message_lower" =~ (^|[[:space:]])#release($|[[:space:]]) ]]; then
            echo "::error::Release preparation requires #release as a standalone marker."
            exit 1
          fi
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - id: version
        run: python tools/release_version.py bump
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev,docs]"
      - run: ruff check .
      - run: mypy optora
      - run: pytest
      - run: zensical build --clean
      - run: python -m build
      - run: twine check dist/*
      - name: Commit and tag release
        id: git_meta
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@://github.com"
          git add pyproject.toml optora/_version.py docs/index.md docs/release.md
          if git diff --cached --quiet; then
            echo "No version files changed."
          else
            git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          fi
          git tag "${{ steps.version.outputs.tag }}"
      - name: Push release commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.version.outputs.tag }}"

  publish:
    name: publish tagged release
    # ONLY run if the trigger event is a Tag creation event
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org
    permissions:
      contents: write
      id-token: write # Mandatory for Trusted Publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify release marker
        run: |
          source_ref="HEAD"
          subject="$(git log -1 --pretty=%s HEAD)"
          if [[ "$subject" == chore\(release\):\ v* ]]; then
            source_ref="HEAD^"
          fi
          message="$(git log -1 --pretty=%B "$source_ref")"
          message_lower="$(printf '%s' "$message" | tr '[:upper:]' '[:lower:]')"
          if [[ ! "$message_lower" =~ (^|[[:space:]])#release($|[[:space:]]) ]]; then
            echo "::error::Tagged release does not trace back to a commit containing #release."
            exit 1
          fi
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m build
      - run: twine check dist/*
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --notes "Automated Optora release ${{ github.ref_name }}."
